# ============================================================
# zensical.toml (Zensical configuration file)
# ============================================================

[project]
site_name = "NLP Text Preprocessing - Sabri Hamdaoui"
site_url = "https://sabrouch36.github.io/nlp-02-text-preprocessing/"
repo_url = "https://github.com/sabrouch36/nlp-02-text-preprocessing"
repo_name = "sabrouch36/nlp-02-text-preprocessing"
site_description = "Text preprocessing project for Web Mining and Applied NLP"
docs_dir = "docs"
site_dir = "site"
edit_uri = "edit/main/docs/"

[project.extra]
social = [
    {icon = "fontawesome/brands/github", link = "https://github.com/sabrouch36/nlp-02-text-preprocessing"},
]

# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------

[project.plugins.search]
lang = "en"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_toc_entry = true
show_signature_annotations = true
separate_signature = true

[project.theme]
features = [
    "navigation.tracking",
    "navigation.expand",
    "navigation.path",
    "navigation.prune",
    "navigation.indexes",
    "toc.follow",
    "toc.integrate",
    "navigation.top",
]

# ------------------------------------------------------------
# Navigation
# ------------------------------------------------------------

nav = [
    { "Home" = "index.md" },
    { "Glossary" = "glossary.md" },
    { "Project Instructions" = "project-instructions.md" },
]
